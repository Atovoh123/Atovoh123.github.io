  function randN() {
    let u = 0;
    let v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function chooseWeighted(arr) {
    const total = arr.reduce((s, x) => s + x.w, 0);
    if (total <= 0) return arr[0].id;
    let r = Math.random() * total;
    for (const x of arr) {
      r -= x.w;
      if (r <= 0) return x.id;
    }
    return arr[arr.length - 1].id;
  }

    );

    if (!options.length) return 'calm';

    return chooseWeighted(options);

  function ensureAudio() {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {

    }
    return audioCtx;
  }

  function tone(freq, dur = 0.12, peak = 0.08, wave = 'sine') {
    if (!settings.soundEnabled) return;
    try {
      const ctx = ensureAudio();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = wave;
      const now = ctx.currentTime;

      o.frequency.setValueAtTime(freq, now);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(peak, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      o.connect(g);
      g.connect(ctx.destination);
      o.start(now);
      o.stop(now + dur + 0.02);
    } catch {}
  }

    const freq =

      r.innerHTML = `<span class="dot"></span>${riskLabel(a)}`;
      td2.appendChild(r);

      const td3 = document.createElement('td');
      td3.id = `cur-${a.id}`;

      const td4 = document.createElement('td');
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.min = '0';
      inp.step = '10';
      inp.id = `tar-${a.id}`;
      inp.addEventListener('input', updateSummary);
      td4.appendChild(inp);

      tr.appendChild(td1);
      tr.appendChild(td2);
      tr.appendChild(td3);
      tr.appendChild(td4);
      tb.appendChild(tr);
    });
  }

  function renderNews() {
    const e = EVS[state.eventId] || EVS.calm;
    const t = evText(state.eventId);

    el('evTitle').textContent = `${e.icon} ${t.title}`;
    el('evDesc').textContent = t.desc;

    const facts = el('evFacts');
    facts.innerHTML = '';
    (t.facts || []).slice(0, 2).forEach((f) => {
      const li = document.createElement('li');
      li.textContent = f;
      facts.appendChild(li);
    });

    const next = el('evNext');
    next.innerHTML = '';
    (e.followUps || []).forEach((f) => {
      const nxt = EVS[f.id];
      if (!nxt) return;

      const nxtText = nxt.text[settings.lang] || nxt.text.en;
      const teaser =
        (f.teaser && (f.teaser[settings.lang] || f.teaser.en)) ||
        nxtText.title;

      const li = document.createElement('li');
      li.textContent = `${nxt.icon} ${teaser}`;
      next.appendChild(li);
    });
  }

  function renderStats() {
    el('statMonth').textContent = `${state.month} / ${settings.months}`;
    el('statWorth').textContent = fmt.c0.format(worth());
    el('statGoal').textContent = fmt.c0.format(settings.goal);
    el('statCash').textContent = fmt.c0.format(state.cash);
  }

  function renderTargets() {
    ASSETS.forEach((a) => {
      el(`cur-${a.id}`).textContent = fmt.c0.format(state.h[a.id]);
      el(`tar-${a.id}`).value = String(Math.round(state.h[a.id]));
    });
  }

  function readTargets() {
    const t = {};
    ASSETS.forEach((a) => {
      t[a.id] = clamp(num(el(`tar-${a.id}`).value), 0, 1e12);
    });
    return t;
  }

  function estimateFees(targets) {
    if (!settings.feesEnabled) return 0;
    let turnover = 0;
    ASSETS.forEach((a) => {
      turnover += Math.abs(targets[a.id] - state.h[a.id]);
    });
    return turnover * settings.feeRate;
  }

  function updateSummary() {
    const total = worth();
    const t = readTargets();
    const sumT = Object.values(t).reduce((s, v) => s + v, 0);
    const fees = estimateFees(t);
    const cashAfter = total - sumT - fees;

    el('sumAvail').textContent = fmt.c0.format(total);
    el('sumFees').textContent = settings.feesEnabled ? fmt.c2.format(fees) : fmt.c2.format(0);
    el('sumCash').textContent = fmt.c0.format(Math.max(0, cashAfter));

    const err = el('allocErr');
    if (cashAfter < -0.01) {
      err.hidden = false;
      err.textContent = settings.lang === 'lv'
        ? 'Tu ievadīji par daudz. Samazini summas.'
        : 'You entered too much. Reduce amounts.';
      el('btnEnd').disabled = true;
    } else {
      err.hidden = true;
      err.textContent = '';
      el('btnEnd').disabled = false;
    }
  }

  function simulateReturn(assetId, eventId) {
    const a = ASSETS.find((x) => x.id === assetId);
    const ev = EVS[eventId] || EVS.calm;
    const imp = (ev.impacts && ev.impacts[assetId]) || { muAdd: 0, sigMul: 1 };

    const mu = a.baseMu + imp.muAdd;
    const sigma = a.baseSigma * imp.sigMul * diffMult();
    const raw = mu + randN() * sigma;

    return clamp(raw, a.clamp[0], a.clamp[1]);
  }

  function openModal(id) {
    el(id).hidden = false;
  }

  function closeModal(id) {
    el(id).hidden = true;
  }

  function closeAllModals() {
    document.querySelectorAll('.overlay').forEach((ov) => {
      ov.hidden = true;
    });
  }

  function openSettingsModal() {
    el('setStart').value = String(settings.start);
    el('setGoal').value = String(settings.goal);
    el('setMonths').value = String(settings.months);
    el('setFees').checked = settings.feesEnabled;
    el('setInfl').checked = settings.inflEnabled;
    el('setSound').checked = settings.soundEnabled;
    el('setDiff').value = settings.difficulty;
    el('setLang').value = settings.lang;
    openModal('modalSettings');
  }

  function fillHowModal() {
    const t = T();
    el('howTitle').textContent = t.howTitle;

    const startTxt = fmt.c0.format(settings.start);

    if (settings.lang === 'lv') {
      el('howContent').innerHTML = `
        <p>Tev ir piešķirts sākuma kapitāls <strong>${startTxt}</strong>, kuru tu vari mainīt <span class="linklike" id="howSettingsLink">iestatījumos</span>.</p>
        <p>Tavs mērķis ir izlasīt jaunākās ziņas, mēģināt paredzēt, kādu ietekmi tās var dot tirgum, un atbilstoši veikt investīcijas.</p>
        <p>Kad to esi izdarījis, spied <strong>Nākamais mēnesis</strong>!</p>
      `;
    } else {
      el('howContent').innerHTML = `
        <p>You get starting capital <strong>${startTxt}</strong>, which you can change in <span class="linklike" id="howSettingsLink">settings</span>.</p>
        <p>Your goal is to read the news update, try to predict how it affects markets, and invest accordingly.</p>
        <p>When you’re ready, press <strong>Next month</strong>!</p>
      `;
    }

    const link = document.getElementById('howSettingsLink');
    if (link) {
      link.addEventListener('click', () => {
        beep('click');
        closeModal('modalHow');
        openSettingsModal();
      }, { once: true });
    }
  }

  function showAssetInfo(a) {
    const title = `${a.icon} ${a.name[settings.lang] || a.name.en}`;
    el('assetTitle').textContent = title;

    const info = a.info[settings.lang] || a.info.en;

    el('assetBodyText').innerHTML = `
      <div class="kpis" style="grid-template-columns:repeat(2,1fr)">
        <div class="kpi">
          <div class="label">${settings.lang === 'lv' ? 'Risks' : 'Risk'}</div>
          <div class="value">${riskLabel(a)}</div>
        </div>
        <div class="kpi">
          <div class="label">${settings.lang === 'lv' ? 'Svārstība (spēlē)' : 'Volatility (game)'}</div>
          <div class="value">≈ ${(a.baseSigma * 100).toFixed(1)}%</div>
        </div>
      </div>
      <p class="small"><strong>${settings.lang === 'lv' ? 'Kas tas ir' : 'What it is'}:</strong> ${info.what}</p>
      <p class="small"><strong>${settings.lang === 'lv' ? 'Risks' : 'Risk'}:</strong> ${info.risk}</p>
      <p class="small"><strong>${settings.lang === 'lv' ? 'Kā tas strādā spēlē' : 'How it works here'}:</strong> ${info.model}</p>
    `;

    openModal('modalAsset');
  }

  function renderHistory() {
    const ol = el('history');
    ol.innerHTML = '';

    if (state.history.length === 0) {
      const li = document.createElement('li');
      li.textContent = settings.lang === 'lv'
        ? 'Vēl nav nospēlēts neviens mēnesis.'
        : 'No months played yet.';
      ol.appendChild(li);
      return;
    }

    [...state.history].reverse().forEach((h) => {
      const li = document.createElement('li');
      const e = EVS[h.eventId] || EVS.calm;
      const tt = evText(h.eventId);
      const d = h.totalAfter - h.totalBefore;
      const monthLabel = settings.lang === 'lv' ? `Mēn. ${h.month}` : `Month ${h.month}`;

      li.innerHTML = `<strong>${monthLabel}</strong> — ${e.icon} <strong>${tt.title}</strong> — ${fmt.c0.format(h.totalAfter)} <span class="${d >= 0 ? 'good' : 'bad'}">(${d >= 0 ? '+' : ''}${fmt.c0.format(d)})</span>`;
      ol.appendChild(li);
    });
  }

  function computeEndStats(finalTotal) {
    const start = settings.start;
    let peak = start;
    let fees = 0;

    for (const h of state.history) {
      peak = Math.max(peak, h.totalAfter);
      fees += h.fees;
    }

    return { start, finalTotal, peak, fees };
  }

  function advanceToPending() {
    if (!pendingAdvance) return;

    state.month = Math.min(state.month + 1, settings.months);
    state.eventId = pendingAdvance.nextEventId;
    pendingAdvance = null;

    renderAll();
  }

  function closeResultAndMaybeAdvance() {
    const shouldAdvance = !!pendingAdvance;
    closeModal('modalResult');
    if (shouldAdvance) advanceToPending();
  }

  function showResult(rec, ended, wonOverall, hitGoalThisMonth) {
    const t = T();
    const e = EVS[rec.eventId] || EVS.calm;
    const tt = evText(rec.eventId);

    const delta = rec.totalAfter - rec.totalBefore;
    const deltaCls = delta >= 0 ? 'good' : 'bad';
    const sign = delta >= 0 ? '+' : '';

    const facts = (tt.facts || []).slice(0, 2).map((s) => `<li>${s}</li>`).join('');

    const rows = ASSETS.map((a) => {
      const start = rec.allocations[a.id];
      const r = rec.returns[a.id];
      const result = start * (1 + r);
      const eur = result - start;
      const rCls = r >= 0 ? 'good' : 'bad';
      const eurCls = eur >= 0 ? 'good' : 'bad';

      return `
        <tr>
          <td>${a.icon} ${a.name[settings.lang] || a.name.en}</td>
          <td>${fmt.c0.format(start)}</td>
          <td class="${rCls}">${fmt.pct.format(r)}</td>
          <td class="${eurCls}">${eur >= 0 ? '+' : ''}${fmt.c0.format(eur)}</td>
          <td>${fmt.c0.format(result)}</td>
        </tr>
      `;
    }).join('');

    el('resTitle').textContent = t.resTitle(ended);

    let progressNote = '';
    if (!ended && hitGoalThisMonth) {
      progressNote = `
        <div class="factbox">
          <p class="small">
            ${
              settings.lang === 'lv'
                ? `Tu sasniedzi mērķi jau ${rec.month}. mēnesī, bet spēle turpināsies līdz ${settings.months}. mēnesim.`
                : `You reached the goal in month ${rec.month}, but the game continues until month ${settings.months}.`
            }
          </p>
        </div>
      `;
    }

    let endBlock = '';
    if (ended) {
      const s = computeEndStats(rec.totalAfter);

      const reachedGoalText =
        settings.lang === 'lv'
          ? (state.goalReached ? `Jā, ${state.goalReachedMonth}. mēnesī` : 'Nē')
          : (state.goalReached ? `Yes, in month ${state.goalReachedMonth}` : 'No');

      const learnLv = `
        <ul class="small">
          <li>Cenas neaug vienmēr — dažreiz ir slikts mēnesis.</li>
          <li>Sadalīt naudu pa vairākiem aktīviem parasti ir drošāk.</li>
          <li>Ziņas un procentu likmes var strauji mainīt cenas, tāpēc risks ir reāls.</li>
        </ul>
      `;

      const learnEn = `
        <ul class="small">
          <li>Prices do not go up every month.</li>
          <li>Splitting money across assets is usually safer than going all-in on one.</li>
          <li>News and interest rates can move markets fast, so risk is real.</li>
        </ul>
      `;

      endBlock = `
        <h3>${t.endSummaryTitle}</h3>
        <div class="factbox">
          <ul class="small" style="margin:0">
            <li><strong>${settings.lang === 'lv' ? 'Sākums' : 'Start'}:</strong> ${fmt.c0.format(s.start)}</li>
            <li><strong>${settings.lang === 'lv' ? 'Mērķis' : 'Goal'}:</strong> ${fmt.c0.format(settings.goal)}</li>
            <li><strong>${settings.lang === 'lv' ? 'Beigās' : 'Final'}:</strong> ${fmt.c0.format(s.finalTotal)}</li>
            <li><strong>${settings.lang === 'lv' ? 'Augstākais punkts' : 'Highest'}:</strong> ${fmt.c0.format(s.peak)}</li>
            <li><strong>${settings.lang === 'lv' ? 'Mērķis sasniegts' : 'Goal reached'}:</strong> ${reachedGoalText}</li>
            <li><strong>${t.resFees}:</strong> ${fmt.c2.format(s.fees)}</li>
          </ul>
        </div>

        <h3>${t.endLearnTitle}</h3>
        <div class="factbox">
          ${settings.lang === 'lv' ? learnLv : learnEn}
        </div>

        <p class="small">${wonOverall ? t.endedWin : t.endedLose}</p>

        <div class="row" style="justify-content:flex-end">
          <button id="btnEndClose">${t.resClose}</button>
          <button class="primary" id="btnAgain">${t.resAgain}</button>
        </div>
      `;
    }

    el('resBody').innerHTML = `
      <div class="kpis">
        <div class="kpi">
          <div class="label">${t.resMonth}</div>
          <div class="value">${rec.month}</div>
        </div>
        <div class="kpi">
          <div class="label">${t.resTotal}</div>
          <div class="value">${fmt.c0.format(rec.totalAfter)}</div>
        </div>
        <div class="kpi">
          <div class="label">${t.resChange}</div>
          <div class="value ${deltaCls}">${sign}${fmt.c0.format(delta)}</div>
        </div>
      </div>

      <h3>${t.resEvent}</h3>
      <p class="small"><strong>${e.icon} ${tt.title}</strong> — ${tt.desc}</p>

      <h3>${t.resFacts}</h3>
      <ul class="small">${facts}</ul>

      <h3>${t.resTable}</h3>
      <div style="overflow:auto">
        <table>
          <thead>
            <tr>
              <th>${t.colAsset}</th>
              <th>${t.colStart}</th>
              <th>${t.colPct}</th>
              <th>${t.colEur}</th>
              <th>${t.colResult}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>

      <p class="small"><strong>${t.resFees}:</strong> ${fmt.c2.format(rec.fees)}</p>

      ${progressNote}

      ${
        ended
          ? endBlock
          : `<button class="primary" id="btnCont">${t.resContinue}</button>`
      }
    `;

    openModal('modalResult');

    if (!ended) {
      const cont = document.getElementById('btnCont');
      if (cont) {
        cont.addEventListener('click', () => {
          beep('click');
          closeResultAndMaybeAdvance();
        }, { once: true });
      }
      beep('next');
    } else {
      if (wonOverall || rec.month >= settings.months) fireworks();
      else beep('error');

      const again = document.getElementById('btnAgain');
      if (again) {
        again.addEventListener('click', () => {
          beep('click');
          closeAllModals();
          newRun();
        }, { once: true });
      }

      const closeBtn = document.getElementById('btnEndClose');
      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          beep('click');
          closeModal('modalResult');
        }, { once: true });
      }
    }
  }

  function endMonth() {
    const totalBefore = worth();
    const t = readTargets();
    const sumT = Object.values(t).reduce((s, v) => s + v, 0);
    const fees = estimateFees(t);
    const cashAfterFees = totalBefore - sumT - fees;

    if (cashAfterFees < -0.01) {
      beep('error');
      return;
    }

    state.h = { ...t };
    state.cash = Math.max(0, cashAfterFees);

    const allocations = { ...state.h };
    const returns = {};

    ASSETS.forEach((a) => {
      const r = simulateReturn(a.id, state.eventId);
      returns[a.id] = r;
      state.h[a.id] *= (1 + r);
    });

    const ev = EVS[state.eventId] || EVS.calm;
    const cashRate = settings.baseCashInterest + ((ev.cash && ev.cash.rateAdd) || 0);
    const infl = settings.inflEnabled
      ? (settings.baseInflation + ((ev.cash && ev.cash.inflAdd) || 0))
      : 0;

    const netCash = clamp(cashRate - infl, -0.20, 0.20);
    state.cash *= (1 + netCash);

    const totalAfter = worth();
    const nextEventId = chooseNextEvent(state.eventId);

    const rec = {
      month: state.month,
      eventId: state.eventId,
      totalBefore,
      totalAfter,
      fees,
      allocations,
      returns
    };

    state.history.push(rec);

    let hitGoalThisMonth = false;
    if (!state.goalReached && totalAfter >= settings.goal) {
      state.goalReached = true;
      state.goalReachedMonth = state.month;
      hitGoalThisMonth = true;
    }

    const wonOverall = state.goalReached;
    const ended = state.month >= settings.months || totalAfter <= 0;

    if (!ended) {
      pendingAdvance = { nextEventId };
    } else {
      pendingAdvance = null;
    }

    showResult(rec, ended, wonOverall, hitGoalThisMonth);

    renderStats();
    renderHistory();
    updateSummary();
  }

  function newRun() {
    const startEvent =
      START_EVENTS[Math.floor(Math.random() * START_EVENTS.length)] || 'calm';

    state = {
      month: 1,
      eventId: startEvent,
      cash: settings.start,
      h: {
        stocks: 0,
        bonds: 0,
        realEstate: 0,
        crypto: 0
      },
      history: [],
      goalReached: false,
      goalReachedMonth: null
    };

    pendingAdvance = null;
    renderAll();
  }

  function renderAll() {
    applyI18n();
    buildAssetRows();
    renderNews();
    renderStats();
    renderTargets();
    updateSummary();
    renderHistory();
  }

  function init() {
    applyI18n();
    newRun();

    el('btnEnd').addEventListener('click', endMonth);

    el('btnRestart').addEventListener('click', () => {
      beep('click');
      closeAllModals();
      newRun();
    });

    el('btnHow').addEventListener('click', () => {
      beep('click');
      fillHowModal();
      openModal('modalHow');
    });

    el('howClose').addEventListener('click', () => {
      beep('click');
      closeModal('modalHow');
    });

    el('btnSettings').addEventListener('click', () => {
      beep('click');
      openSettingsModal();
    });

    el('setClose').addEventListener('click', () => {
      beep('click');
      closeModal('modalSettings');
    });

    el('assetClose').addEventListener('click', () => {
      beep('click');
      closeModal('modalAsset');
    });

    el('resClose').addEventListener('click', () => {
      beep('click');
      if (!el('modalResult').hidden && pendingAdvance) {
        closeResultAndMaybeAdvance();
      } else {
        closeModal('modalResult');
      }
    });

    el('setApply').addEventListener('click', () => {
      beep('click');

      const start = clamp(num(el('setStart').value), 1, 1e12);
      const goal = clamp(num(el('setGoal').value), 1, 1e12);
      const months = clamp(Math.floor(num(el('setMonths').value)), 1, 120);

      settings = {
        ...settings,
        lang: el('setLang').value || 'lv',
        start,
        goal: Math.max(goal, start),
        months,
        feesEnabled: el('setFees').checked,
        inflEnabled: el('setInfl').checked,
        soundEnabled: el('setSound').checked,
        difficulty: el('setDiff').value || 'normal'
      };

      saveSettings(settings);
      closeAllModals();
      newRun();
    });

    document.querySelectorAll('.overlay').forEach((ov) => {
      ov.addEventListener('mousedown', (e) => {
        if (e.target !== ov) return;

        if (ov.id === 'modalResult' && pendingAdvance) {
          beep('click');
          closeResultAndMaybeAdvance();
        } else {
          ov.hidden = true;
        }
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;

      const open = [...document.querySelectorAll('.overlay')].filter((x) => !x.hidden);
      if (!open.length) return;

      const top = open[open.length - 1];

      if (top.id === 'modalResult' && pendingAdvance) {
        beep('click');
        closeResultAndMaybeAdvance();
      } else {
        top.hidden = true;
      }
    });
  }

  window.addEventListener('DOMContentLoaded', init);
})();
</script>
